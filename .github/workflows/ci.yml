name : CI - install dependencies , verify build 

# Run on every push and pull request to main branch 

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build and Test Shopsmart
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ./client/package-lock.json
          
      - name: Install Server Dependencies
        working-directory: ./server
        run: npm install

      - name: Start Server Background
        working-directory: ./server
        run: npm start &
        
      - name: Install Client Dependencies
        working-directory: ./client
        run: npm install

      - name: Install Playwright Browsers
        working-directory: ./client
        run: npx playwright install --with-deps chromium

      - name: Run Unit and Integration Tests (Jest)
        working-directory: ./client
        run: npm run test

      - name: Start Client Frontend
        working-directory: ./client
        run: npm run dev &
        
      - name: Wait for Servers
        run: sleep 5
        
      - name: Run E2E Tests (Playwright)
        working-directory: ./client
        run: npm run test:e2e -- --reporter=html

      - name: Upload Playwright Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: ./client/playwright-report/
          retention-days: 7
          
      - name: Verify build
        working-directory: ./client
        run: npm run build
        
      # Optional not mentioned in task1 : upload the build artefact for inspection
      - name: Upload build artefact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: vite-build
          path: ./client/dist
