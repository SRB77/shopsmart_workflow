name: Backend Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./server

    steps:
      # Setup 
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      # Install 
      - name: Install Dependencies
        run: npm install

      # Code Quality 
      - name: Lint
        run: npm run lint

      - name: Format Check
        run: npm run format:check

      # Unit & Integration Tests (Jest) 
      - name: Run Tests (Jest)
        run: npm test

      # Security Audit 
      - name: Security Audit
        run: npm audit --audit-level=high || true
